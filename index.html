<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Сертификатов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Генератор Сертификата</h1>
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="Введите ФИО" autocomplete="off">
            <button id="downloadBtn">Скачать PNG</button>
        </div>
        
        <div class="preview-container">
            <canvas id="certificateCanvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
